<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --cream:       #f5f0e8;
    --cream-dark:  #ede6d6;
    --cream-border:#d9ceba;
    --green-deep:  #1a3d2b;
    --green-mid:   #2d6a4f;
    --green-light: #52b788;
    --green-pale:  #d8f3dc;
    --green-mist:  #e9f5eb;
    --text-main:   #1e2d1f;
    --text-mid:    #3a4f3b;
    --text-soft:   #6b7f6c;
    --gold:        #b5883a;
    --gold-light:  #f0d9a0;
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bot:    env(safe-area-inset-bottom, 0px);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background-color: var(--cream);
    color: var(--text-main);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(82,183,136,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(26,61,43,0.07) 0%, transparent 50%);
  }

  /* ── Header (accounts for iPhone notch/Dynamic Island) ──────────────── */
  header {
    background: var(--green-deep);
    color: var(--cream);
    padding: 0 1.5rem;
    padding-top: var(--safe-top);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    min-height: calc(64px + var(--safe-top));
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(26,61,43,0.3);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-shrink: 0;
  }

  .brand-icon {
    width: 32px; height: 32px;
    background: var(--green-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }

  .brand-name {
    font-family: 'Amiri', serif;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--gold-light);
  }

  /* ── Surah selector ──────────────────────────────────────────────────── */
  .selector-wrap {
    position: relative;
    flex: 1;
    max-width: 420px;
  }

  .selector-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--green-light);
    font-size: 12px;
    pointer-events: none;
  }

  #surahSelect {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(82,183,136,0.35);
    border-radius: 8px;
    color: var(--cream);
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    padding: 0.55rem 2.2rem 0.55rem 0.9rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  #surahSelect:focus {
    border-color: var(--green-light);
    background: rgba(255,255,255,0.12);
  }

  #surahSelect option {
    background: var(--green-deep);
    color: var(--cream);
  }

  /* ── Offline banner ──────────────────────────────────────────────────── */
  #offlineBanner {
    display: none;
    background: var(--gold);
    color: #fff;
    text-align: center;
    font-size: 0.78rem;
    padding: 0.4rem 1rem;
    letter-spacing: 0.04em;
  }

  #offlineBanner.show { display: block; }

  /* ── Main ────────────────────────────────────────────────────────────── */
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.25rem calc(4rem + var(--safe-bot));
  }

  /* ── Surah header card ───────────────────────────────────────────────── */
  .surah-header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding: 2rem 1.5rem 1.75rem;
    background: var(--green-deep);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(26,61,43,0.2);
    animation: fadeSlideIn 0.35s ease both;
  }

  .surah-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(82,183,136,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  .surah-header-ornament {
    font-size: 1.4rem;
    letter-spacing: 0.5rem;
    color: var(--gold-light);
    opacity: 0.5;
    margin-bottom: 0.5rem;
  }

  .surah-arabic {
    font-family: 'Amiri', serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    color: var(--gold-light);
    line-height: 1.3;
    margin-bottom: 0.3rem;
  }

  .surah-transliteration {
    font-size: 1rem;
    color: var(--green-light);
    font-style: italic;
    margin-bottom: 0.15rem;
  }

  .surah-meta {
    font-size: 0.8rem;
    color: rgba(245,240,232,0.45);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Placeholder ─────────────────────────────────────────────────────── */
  .placeholder {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--text-soft);
    animation: fadeSlideIn 0.4s ease both;
  }

  .placeholder-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: 0.35; }

  .placeholder p {
    font-size: 1.05rem;
    font-style: italic;
    line-height: 1.7;
  }

  /* Tip shown only when accessed as installed PWA */
  .install-tip {
    display: none;
    margin-top: 1.5rem;
    font-size: 0.82rem;
    color: var(--green-mid);
    background: var(--green-pale);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    line-height: 1.6;
  }

  /* ── Ayah cards ──────────────────────────────────────────────────────── */
  .ayah-list { display: flex; flex-direction: column; gap: 1.25rem; }

  .ayah-card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid var(--cream-border);
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(26,61,43,0.06);
    animation: fadeSlideIn 0.3s ease both;
  }

  .ayah-card:nth-child(1)  { animation-delay: 0.02s }
  .ayah-card:nth-child(2)  { animation-delay: 0.04s }
  .ayah-card:nth-child(3)  { animation-delay: 0.06s }
  .ayah-card:nth-child(4)  { animation-delay: 0.08s }
  .ayah-card:nth-child(5)  { animation-delay: 0.10s }
  .ayah-card:nth-child(n+6){ animation-delay: 0.12s }

  .ayah-top {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    background: var(--green-mist);
    border-bottom: 1px solid var(--cream-border);
  }

  .ayah-badge {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--green-deep);
    color: var(--green-pale);
    font-size: 0.72rem;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .ayah-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-soft);
  }

  /* ── Translation ─────────────────────────────────────────────────────── */
  .ayah-translation {
    padding: 1rem 1.1rem 0.85rem;
    font-size: 1.02rem;
    line-height: 1.75;
    color: var(--text-main);
    border-bottom: 1px solid var(--cream-border);
    position: relative;
  }

  .ayah-translation::before {
    content: '"';
    font-family: 'Amiri', serif;
    font-size: 2.8rem;
    color: var(--green-light);
    opacity: 0.28;
    position: absolute;
    top: 0.1rem; left: 0.7rem;
    line-height: 1;
  }

  .translation-text { padding-left: 1.4rem; }

  /* ── Commentary ──────────────────────────────────────────────────────── */
  .commentary-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.7rem 1.1rem;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 0.8rem;
    color: var(--green-mid);
    text-align: left;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 600;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px; /* iOS tap target */
  }

  .commentary-toggle:hover,
  .commentary-toggle:active { background: var(--green-pale); }

  .toggle-chevron {
    font-size: 0.75rem;
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }

  .commentary-toggle[aria-expanded="true"] .toggle-chevron {
    transform: rotate(180deg);
  }

  .commentary-body {
    display: none;
    padding: 0 1.1rem 1.1rem;
    color: var(--text-mid);
    font-size: 0.97rem;
    line-height: 1.85;
    border-top: 1px dashed var(--cream-border);
  }

  .commentary-body.open {
    display: block;
    animation: expandIn 0.2s ease both;
  }

  .commentary-body .cm-arabic {
    font-family: 'Amiri', serif;
    font-size: 1.25rem;
    color: var(--green-deep);
    direction: rtl;
    text-align: right;
    display: block;
    margin: 0.6rem 0 0.9rem;
    line-height: 1.7;
  }

  .commentary-body h2, .commentary-body h3 {
    font-family: 'Lora', serif;
    color: var(--green-deep);
    margin: 1.1rem 0 0.4rem;
    font-weight: 600;
  }

  .commentary-body h2 { font-size: 1rem; }
  .commentary-body h3 { font-size: 0.93rem; font-style: italic; }
  .commentary-body p  { margin-bottom: 0.85rem; }
  .commentary-body strong { color: var(--green-deep); font-weight: 600; }
  .commentary-body em     { color: var(--text-soft); font-style: italic; }

  .no-commentary {
    padding: 0.55rem 1.1rem 0.8rem;
    font-size: 0.78rem;
    color: var(--text-soft);
    font-style: italic;
  }

  /* ── Loader / error ──────────────────────────────────────────────────── */
  .loader {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-soft);
    font-style: italic;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .error-msg {
    background: #fdf0f0;
    border: 1px solid #e8c5c5;
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    color: #7a3535;
    font-size: 0.92rem;
    line-height: 1.6;
    margin-top: 1rem;
  }

  /* ── Animations ──────────────────────────────────────────────────────── */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes expandIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 1;   }
  }

  /* ── Scroll to top ───────────────────────────────────────────────────── */
  #scrollTop {
    position: fixed;
    bottom: calc(1.5rem + var(--safe-bot));
    right: 1.5rem;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--green-deep);
    color: var(--cream);
    border: none;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(26,61,43,0.3);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 99;
    -webkit-tap-highlight-color: transparent;
  }

  #scrollTop.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

  /* ── Mobile ──────────────────────────────────────────────────────────── */
  @media (max-width: 480px) {
    header { padding: 0.7rem 1rem; padding-top: var(--safe-top); flex-wrap: wrap; min-height: unset; }
    .brand-name  { font-size: 1.1rem; }
    .selector-wrap { max-width: 100%; }
    main { padding: 1.25rem 0.85rem calc(3rem + var(--safe-bot)); }
    .surah-header { padding: 1.5rem 1rem 1.25rem; }
    .ayah-translation { font-size: 0.97rem; }
    .commentary-body  { font-size: 0.93rem; }
  }
</style>
</head>

// ── Register service worker ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('[SW] registered, scope:', reg.scope);
    }).catch(err => {
      console.warn('[SW] registration failed:', err);
    });
  });
}

// ── Offline banner ────────────────────────────────────────────────────────
window.addEventListener('online',  () => document.getElementById('offlineBanner').classList.remove('show'));
window.addEventListener('offline', () => document.getElementById('offlineBanner').classList.add('show'));
if (!navigator.onLine) document.getElementById('offlineBanner').classList.add('show');

// ── Show install tip when running as installed PWA ────────────────────────

    window.navigator.standalone === true) {
  document.getElementById('installTip').style.display = 'block';
}

// ── Populate dropdown ─────────────────────────────────────────────────────
const select = document.getElementById('surahSelect');

ph.value = ''; ph.textContent = '— Choose a Surah —';
ph.disabled = true; ph.selected = true;
select.appendChild(ph);

SURAHS.forEach(([num, translit, arabic, meaning, verses]) => {
  const opt = document.createElement('option');
  opt.value = num;
  opt.textContent = `${num}. ${translit} (${verses})`;
  select.appendChild(opt);

// ── Scroll-to-top ─────────────────────────────────────────────────────────
const scrollBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  scrollBtn.classList.toggle('visible', window.scrollY > 300);
}, { passive: true });

// ── Commentary renderer ───────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCommentary(raw) {
  if (!raw) return '';
  const lines = raw.split('\n');
  let html = '';
  let i = 0;

  if (lines[0] && /[\u0600-\u06FF]/.test(lines[0])) {
    html += `<span class="cm-arabic">${escHtml(lines[0])}</span>`;
    i = 1;
  }

  const segments = lines.slice(i).join('\n').split('\n\n');
  segments.forEach(seg => {
    const t = seg.trim();
    if (!t) return;
    if      (t.startsWith('### ')) html += `<h3>${escHtml(t.slice(4))}</h3>`;
    else if (t.startsWith('## '))  html += `<h2>${escHtml(t.slice(3))}</h2>`;
    else if (t.startsWith('# '))   html += `<h2>${escHtml(t.slice(2))}</h2>`;
    else {
      const body = t
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .split('\n').join('<br>');
      html += `<p>${body}</p>`;
    }
  });
  return html;
}

function toggleCommentary(btn) {
  const body = btn.nextElementSibling;
  const open = body.classList.toggle('open');
  btn.setAttribute('aria-expanded', open);
}

// ── Load surah ────────────────────────────────────────────────────────────
let currentLoad = 0;

select.addEventListener('change', () => {
  const num = parseInt(select.value);
  if (num) loadSurah(num);
});

async function loadSurah(num) {
  const myLoad = ++currentLoad;
  const mainEl = document.getElementById('main');
  const meta   = SURAHS[num - 1];

  mainEl.innerHTML = `<div class="loader">Loading ${meta[1]}…</div>`;

  let data;
  try {
    const res = await fetch(`data/${num}.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
  } catch(e) {
    if (myLoad !== currentLoad) return;
    mainEl.innerHTML = `
      <div class="error-msg">
        <strong>Could not load Surah ${num}.</strong><br>
        Make sure <code>data/${num}.json</code> is present.<br>
        <small>${escHtml(e.message)}</small>
      </div>`;
    return;
  }

  if (myLoad !== currentLoad) return;

  let html = `
    <div class="surah-header">
      <div class="surah-header-ornament">— ✦ —</div>
      <div class="surah-arabic">${escHtml(meta[2])}</div>
      <div class="surah-transliteration">${escHtml(meta[1])}</div>
      <div class="surah-meta">${escHtml(meta[3])} &nbsp;·&nbsp; ${meta[4]} Ayahs</div>
    </div>
    <div class="ayah-list">`;

  data.forEach(({ surah, ayah: n, translation, commentary }) => {
    const hasComm = commentary && commentary.trim().length > 0;
    html += `
      <div class="ayah-card">
        <div class="ayah-top">
          <div class="ayah-badge">${n}</div>
          <span class="ayah-label">Surah ${surah} · Ayah ${n}</span>
        </div>
        <div class="ayah-translation">
          <div class="translation-text">${escHtml(translation || '—')}</div>
        </div>`;

    if (hasComm) {
      html += `
        <div class="commentary-section">
          <button class="commentary-toggle" onclick="toggleCommentary(this)" aria-expanded="false">
            Commentary <span class="toggle-chevron">▾</span>
          </button>
          <div class="commentary-body">${renderCommentary(commentary)}</div>
        </div>`;
    } else {
      html += `<div class="no-commentary">No commentary available.</div>`;
    }

    html += `</div>`;
  });

  html += `</div>`;
  mainEl.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
