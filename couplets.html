<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://i.postimg.cc/3RS56xZj/20250119-095943-removebg-preview.png" /> 
    <title>My Couplets - Zimaam Zayn</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* --- General Reset & Theme --- */
        body {
            background-color: #f0fdf4; /* Very light mint green */
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px;
            color: #14532d; /* Dark green text for contrast */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Header Styling --- */
        h1 {
            color: #15803d; /* Green title */
            margin-bottom: 30px;
            font-weight: 700;
            text-align: center;
            font-size: 2.5rem;
        }

        /* --- Container for the cards --- */
        #couplet-container {
            width: 100%;
            max-width: 600px; /* Limits width on PC, full width on phone */
            display: flex;
            flex-direction: column;
            gap: 20px; /* Space between cards */
        }

        /* --- The Card (Goodreads Style) --- */
        .card {
            background-color: #ffffff;
            border: 2px solid #4ade80; /* Bright green border */
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px); /* Slight lift on hover */
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .couplet-roman {
            font-size: 1.25rem;
            font-weight: 700;
            color: #166534;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .divider {
            height: 1px;
            background-color: #bbf7d0;
            margin: 10px 0;
            width: 50px; /* Short divider line */
        }

        .couplet-translation {
            font-size: 1rem;
            color: #4b5563; /* Greyish text for translation */
            font-style: italic;
        }

        /* --- Footer Styling --- */
        footer {
            margin-top: auto; /* Pushes footer to bottom */
            padding-top: 40px;
            padding-bottom: 20px;
            font-size: 0.9rem;
            color: #15803d;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>My Couplets</h1>

    <div id="couplet-container"></div>

    <footer>
        With ❤️ by Zayn
    </footer>

    <script>
        // --- DATA SECTION ---
        // You can add more couplets here. 
        // Just copy the structure: { roman: "...", trans: "..." },
        const coupletsArray = [
    {
        "roman": "Nafrat ki mujhe koi bhi tu ek ada toh de,\nKis baat se naraaz hai itna bata toh de.\n\nThoda hi toh chalna hai mere saath yahan tak,\nKuch der sahi, saath mera tu nibha toh de.\n\nMuddat hui is dil ko qaraar ab nahin milta,\nBeemar-e-mohabbat ko tu ab koi shifa toh de.\n\nTaabeer mile jisse mere khwaab-e-kuhan ko,\nJalte hue sehra mein koi aisi sada toh de.\n\nMilne ki ghadi aakhiri ab aa hi gayi hai,\nKhidki se zara apna tu chehra dikha toh de.\n\nRuswa na karo Zain ko tum shehar mein is tarah,\nGar jurm kiya hai toh koi usko saza toh de.",
        "trans": "Show me at least one gesture of your deep disdain,\nTell me what makes you angry, why you cause this pain.\n\nYou only have to walk with me a little way,\nStand by my side for just a moment, if you may.\n\nIt has been ages since this heart found any rest,\nGive some cure to this sick love beating in my breast.\n\nTo give a meaning to my ancient, withered dreams,\nCall out to me across the burning desert streams.\n\nThe final moment of our meeting is now here,\nJust show your face from the window, my dear.\n\nDo not disgrace Zain in the city like this,\nIf he has sinned, give him a punishment to miss."
    },
    {
        "roman": "Mujh se be-ja ab tawaqqo bhi laga baithe hain wo,\nApne ghar ko ab miri khatir saja baithe hain wo.\n\nPaon apni hi jagah se bhi na aage badh sake,\nAur zamane ko miyan sab kuch dikha baithe hain wo.\n\nSirf ik hi baar un se hum mile the raah mein,\nHum ko ab apna mukammal hi likha baithe hain wo.\n\nTha hunar aisa ki bas ik baar ki us deed mein,\nPoori duniya ko hi ab jeena sikha baithe hain wo.\n\nSab humein kehte the patthar-dil magar dekho toh Zain,\nApni meethi baaton se hi ab rula baithe hain wo.",
        "trans": "They have harbored baseless expectations of me now,\nThey have adorned their home just for my sake somehow.\n\nTheir feet couldn't even move forward from their place,\nYet they pretend to show the world their winning pace.\n\nWe met them only once upon the winding way,\nAnd now they claim us completely as theirs today.\n\nSuch was their skill that in a single, fleeting glance,\nThey taught the whole world how to live and dance.\n\nEveryone called me stone-hearted, but look at this Zain,\nWith their sweet words, they have brought me to tears in pain."
    },
    {
        "roman": "Kya mire ashaar mein ab bhi koi jaan hai?,\nMar gaye jo, kya yahan un ka bhi jahaan hai?\n\nHum ko duniya ne hunar ki nishani jaana par,\nLog samjhe hi nahin maut ka nishaan hai.\n\nKoi bhi na kuch kahe is jahan mein ab magar,\nSirf meri hi yahan bolti zubaan hai.\n\nDushmanon ne dost hi mujhmein paaya aaj hai,\nDhoondhta hoon main kahan ab bachi amaan hai.\n\nMaut meri sakht hogi ye kehte hain magar,\nKhaak hona 'Zain' ka ek bura gumaan hai.",
        "trans": "Is there still any life left in my verses today?,\nThose who have died, is this their world too, I pray?\n\nThe world considered me a symbol of great art,\nBut people never understood the deathmark on my heart.\n\nThough no one says a word in this world anymore,\nMine is the only voice that echoes to the core.\n\nEven my enemies have found a friend in me today,\nI search for a place where safety might still stay.\n\nThey say my death will be a harsh and bitter plight,\nBut Zain turning to dust is just a cruel illusion of the night."
    },
    {
        "roman": "Haan haqeeqi, dard-e-ulfat sirf kadwa paani hai,\nAzm-e-dil par shak na karna, hum hi iske baani hain.\n\nYeh mera masla nahin hai, sab tiri hi marzi hai,\nBaat jo tum ne chhupayi, hum ne ab wo jaani hai.\n\nEk murde ko hi maara, chot kaisi di gayi,\nZulm karne mein na dekha, koi tum sa saani hai.\n\nRooh ko jo cheer de woh, ab azaab-e-jaan nahin,\nSab fanaa hona hai aakhir, dastaan yeh faani hai.\n\nKho chuke sab, 'Zain' ab is zehr-e-tanhai mein hi,\nHaar ab hum ne bhi apni, aaj dil se maani hai.",
        "trans": "Yes truly, the pain of love is but bitter water to drink,\nDo not doubt the heart's resolve, we are its founders, I think.\n\nThis is not my problem, it is entirely your will,\nThe secret you concealed, I have understood it still.\n\nYou struck one already dead, what a blow you threw,\nIn committing cruelty, I've seen no equal to you.\n\nWhat tears the soul apart is no longer a vital pain,\nEverything will perish eventually, this story is in vain.\n\nHaving lost it all, Zain, in this poison of solitude,\nI have finally accepted my defeat with a willing attitude."
    },
    {
        "roman": "Saari ye ghaltiyan humari hain,\nAb sharafat jo tum pe taari hai.\n\nRona toh bas mera hi banta tha,\nPar ye nainon se tere jaari hai.\n\nLog kitne rulaye the, kam the?,\nJo humari bhi ab ye baari hai.\n\nToot kar reh gaye sabhi rishte,\nSab mita, phir bhi kyun ye yaari hai.\n\nDard mein bhi main chup hi rehta hoon,\nTu bata kis ke gham ki maari hai?",
        "trans": "All of these mistakes belong only to me,\nWhile nobility is the only thing that you decree.\n\nThe right to cry belonged solely to my eyes,\nYet it is from your gaze the falling teardrops rise.\n\nWere the people you made cry not enough before?,\nThat now it is my turn to weep at your door.\n\nAll the relationships have broken and decayed,\nEverything is gone, yet why hasn't this friendship frayed?\n\nEven in deep pain, I maintain a silent grace,\nTell me, whose sorrow reflects upon your face?"
    },
    {
        "roman": "Tumne mujhe kis haal mein yun daal diya hai,\nIk zinda badan maut ka maara sa laga hai.\n\nAb shehar ke baazaar mein jaana hi kahan hai,\nDehleez ke goshe mein hi maskan sa mila hai.\n\nIs band se goshe mein ye aafat hi machi hai,\nSooraj bhi yahan chhat pe utaara hi gaya hai.\n\nSaabit hain wafadaar mire aaj yahan pe,\nCharcha mein jinhone humein ab dhoondh liya hai.\n\nHaasil na hui zeest ki rahat kabhi jaanan,\nKhud apna hi chehra mujhe sehra sa dikha hai.",
        "trans": "Into what wretched state have you cast me down?,\nA living body feels like death has claimed its crown.\n\nThere is no need to visit the city market anymore,\nI have found my dwelling in the corner of my door.\n\nIn this closed-off corner, a disaster has spun,\nIt feels as though the roof has pulled down the sun.\n\nMy loyal ones have proven themselves here today,\nThose who found me in the gossip along the way.\n\nThe comfort of life was never achieved, my dear,\nMy own face looks like a barren desert here."
    },
    {
        "roman": "Bigadti ja rahi haalat bigadti hi chali jaaye,\nWo humse shauq se yun hi jhagadti hi chali jaaye.\n\nMain apni nek koshish se bhala hona hi chaahun par,\nFaqat ye rooh ki haalat tadapti hi chali jaaye.\n\nQalam se ab miri bas ik siyahi hi nikalti hai,\nJahan ki ab ye aagahi ujadti hi chali jaaye.\n\nMain apni tez raftaaron se uska haath pakdun par,\nTabhi wo haath se dekho bichhadti hi chali jaaye.\n\nKise hai chain jeene mein, kise aaram milta hai?,\nYe har ik saans seene mein jakadti hi chali jaaye.\n\nNazar us par padi kya thi, qayamat aa gayi dil par,\nQafas mein rooh takra kar uchhalti hi chali jaaye.\n\nLikhun main zehar jitna bhi, ghazal ye maan leti hai,\nNa jaane kyun ye duniya ab bahalti hi chali jaaye.",
        "trans": "The condition keeps worsening, let it continue to decline,\nLet her keep fighting with me fondly, blurring every line.\n\nI wish to heal through all my noble tries,\nBut this soul's condition only suffers and cries.\n\nOnly dark ink flows from my pen these days,\nWhile the wisdom of the world decays in a haze.\n\nI try to catch her hand with all my rushing might,\nBut watch her slip away from my grasp into the night.\n\nWho finds peace in living, who finds true rest?,\nEvery single breath keeps tightening in the breast.\n\nThe moment my eyes fell on her, doomsday struck my heart,\nThe soul in its cage keeps thrashing, tearing itself apart.\n\nNo matter how much poison I write, the poem bears the weight,\nI know not why this world keeps getting amused by my fate."
    },
    {
        "roman": "Zindagi ke, is safar mein, tum adhoori, aas hi ho,\nSakht sehra, mein musafir, ki purani, pyas hi ho.\n\nWaqt milne, ka humara, aa gaya hai, ab toh aakhir,\nAa bhi jao, tum ki ab bhi, sabse zyada, khaas hi ho.\n\nBheed mein is, shehar ki main, dhoondhta hoon, khud ko lekin,\nMain kahan, hoon tum batao, tum toh mere, paas hi ho.\n\nHashr mera, kuch bhi ho ab, par dua hai, rab se meri,\nChun liya hai, jisko tumne, wo tumhein ab, raas hi ho.\n\nBhool baitha, hoon main sab kuch, ab kisi se, kya kahun main,\nDastaan ab, tum sunao, tum bhi iski, qaas hi ho.\n\nAa ke milna, tum magar, us daur mein, bhi yaad se phir,\nMeri turbat, ko dhake, jab sirf sabza, ghaas hi ho.",
        "trans": "In this journey of life, you are an incomplete hope,\nLike an old thirst of a traveler on a harsh desert slope.\n\nThe time for our meeting has finally arrived at last,\nCome now, for you are still the most special from my past.\n\nIn the crowds of this city, I search for my own face,\nTell me where I am, for you are right here in my space.\n\nWhatever becomes of me now, my prayer to God is this:\nMay the one you have chosen bring you perfect bliss.\n\nI have forgotten everything, what can I say to anyone?,\nYou tell the story now, you are its essence under the sun.\n\nBut remember to come and meet me in that era too,\nWhen only green grass covers my grave from view."
    },
    {
        "roman": "Dard ke baadal ab, sar se dhalte nahin,\nDekh kar ghair ko, ab toh jalte nahin.\n\nKyun meri baat pe, rokte hain mujhe,\nUnke tukdon pe hum, jab ke palte nahin.\n\nBe-rukhi seekh li, humne bhi shauq se,\nUske jaadoo yahan, aaj chalte nahin.\n\nHaar par muskuraate hain hum aaj-kal,\nHaath apne kabhi ab toh malte nahin.\n\nKyun mujhe har ghadi, wo sikhate hain ab,\nKyun khabar ye nahin, hum badalte nahin.\n\nAap bhi chhod dein, koshishein aaj se,\nMom ke jaise hum toh pighalte nahin.\n\nTod di aas jab, khaas insaan ne,\nYaar ghar se kahin, hum nikalte nahin.",
        "trans": "The clouds of pain no longer fade from my head,\nSeeing you with strangers, my jealousy is dead.\n\nWhy do they silence me when I start to speak?,\nI don't survive on the crumbs of the strong or the weak.\n\nI have gladly learned the art of cold disdain,\nHer magic spells here now work entirely in vain.\n\nI smile at my defeats in these modern days,\nI no longer wring my hands in sorrow's bitter maze.\n\nWhy do they try to teach me at every single hour?,\nWhy don't they know I'll never change my core or power.\n\nYou too should give up your efforts from today,\nI am not like wax that easily melts away.\n\nWhen a special person shattered all my hope and trust,\nI stopped leaving the house, gathering silent dust."
    },
    {
        "roman": "Dikh gaye jo ye nazaare hain aapke,\nKhwaab humne bhi sanwaare hain aapke.\n\nKhel phir se khelna hai ab kyun bhala?,\nHusn se toh baith haare hain aapke.\n\nBaat jo hai poochhni wo hai aapse,\nAur kitne fard maare hain aapke.\n\nTaar mere jab jude jaakar aapse,\nCall pe ye call aare hain aapke.\n\nDekhte hain arsh par hum raat ko ab,\nYe chamakte jo sitaare hain aapke.",
        "trans": "Now that I have witnessed these sights of you,\nI too have adorned the dreams of you.\n\nWhy do we need to play this game once more?,\nI have already surrendered to your beauty's lore.\n\nThe question that I really need to ask of you,\nHow many other souls have your charms run through?\n\nWhen the strings of my heart connected with yours,\nCalls upon calls come rushing through my doors.\n\nWhen I look up at the sky in the dark of night,\nThese shining stars belong to your guiding light."
    },
    {
        "roman": "Nazar us mah-vash ki taab jaisi wo adaa par hai,\nKhabar hai kya ki ab us ka makaan koo-e-jafaa par hai.\n\nHaasil hai ye hayaat toh is ka kya kare,\nMushkil hai ab ye baat toh is ka kya kare.\n\nQissa hi raat ko ye agar khatam ho mera,\nAisi ho jo nijaat toh is ka kya kare.\n\nRuswa hui hai rooh toh, ab nam hai ye basar,\nAisi hai apni zaat toh is ka kya kare.\n\nZulmat nahin hai chhatti na milta hai ab sukoon,\nKatti nahin ye raat toh is ka kya kare.\n\nKhaali hai haath aur safar umar bhar kiya,\nApni nahin sifaat toh is ka kya kare.\n\nHisse hue hain aur batana hi kya hai ab,\nAisi hai ab jamaat toh is ka kya kare.",
        "trans": "Her gaze rests on that glowing, moon-like grace,\nDoes she know her home is now in cruelty's place?\n\nIf this life is acquired, what should one do with it?,\nNow this matter is difficult, what should one do with it?\n\nIf my story ends in the darkness of the night,\nIf salvation comes like this, what should one do with it?\n\nThe soul is disgraced, and the eyes are filled with tears,\nIf this is my very being, what should one do with it?\n\nThe darkness doesn't lift, nor is there any peace,\nIf this night refuses to pass, what should one do with it?\n\nHands are empty despite a lifelong wandering trace,\nIf one lacks their own virtues, what should one do with it?\n\nWe have been divided, what else is there to tell?,\nIf the gathering is like this, what should one do with it?"
    },
    {
        "roman": "Woh teri gehri si nigah mujh par nahin,\nRahmat ki ab wo jo wajah mujh par nahin.\n\nZulm-e-tapish ki dhoop hai chaaron taraf,\nKhalq-e-Khuda mein ab panah mujh par nahin.\n\nUs ki wo majlis zulm karti hi rahi,\nUs ki tawajjoh ki shafah mujh par nahin.\n\nYe soch kar hairaan dil hota hai ab,\nKi zehan tera kis tarah mujh par nahin.\n\nAb ke batana bhi hai tum ko baat ye,\nYe husn dikhne pe gunah mujh par nahin.\n\nHaasil mohabbat jab nahin hai Zain toh,\nAfsos ki shab hai siyah mujh par nahin.",
        "trans": "That deep, piercing gaze of yours is not on me,\nThe reason for your mercy is no longer on me.\n\nThe scorching sun of cruelty shines all around,\nIn God's creation, no refuge for me is found.\n\nHer gathering continued to inflict its cruel sting,\nThe healing of her attention is not on me.\n\nMy heart becomes astonished when it comes to find,\nHow I am no longer present within your mind.\n\nI must also tell you this one thing today,\nWhen this beauty shows, the sin is not mine to pay.\n\nWhen love is unachieved and forever out of sight,\nZain, the night of sorrow is not dark upon my right."
    },
    {
        "roman": "Us yaar par hi maine zamana luta diya,\nWo tha hi ek ghazal jise sab ko suna diya.\n\nAiwan ko kafan bana ke maine di sada,\nIn ashk ne zamane ko ab hai rula diya.\n\nLogon ne hai nahin mujhe itna bhi kuch diya,\nHaasil jo bhi hua na wo mera khuda diya.\n\nKehte hain wo sabhi mujhe, ab aaiye nikal,\nHum se toh is siyahi ne sab kuch likha diya.\n\nPoocha hai baarha hi, ki thi kya miri khata,\nIs aag ko na jaane, ye kisne badha diya.\n\nHaan baat hai tiri hi, tu sunta bhi ab hai kya?,\nYa kaan mein ye jo bhi hai, tune laga diya.\n\nTune kahan suna hai kabhi, apne Zain ko!,\nRo-ega tu bhi dekh, ki kisko gawa diya.",
        "trans": "I sacrificed the whole world for that one friend,\nHe was a poem I recited to everyone till the end.\n\nTurning the palace into a shroud, I called out loud,\nThese tears have now made the whole world weep in a crowd.\n\nPeople haven't really given me much of their own,\nWhatever I have achieved, God bestowed it alone.\n\nThey all say to me, 'Come out of it now and flee,'\nBut this dark ink has written everything through me.\n\nI have asked repeatedly, what was my actual crime?,\nWho fueled this fire that burns through space and time?\n\nYes, it's about you, but do you even hear my plea?,\nOr have you plugged your ears from everything you see?\n\nWhen have you ever listened to your devoted Zain!,\nYou will cry too, realizing who you lost in vain."
    },
    {
        "roman": "Kitni khush tum rehti ho ab,\nBaatein itni karti ho ab.\n\nTark-e-rishta karti theen tum,\nUs pe kaise marti ho ab.\n\nMujhko mujrim kehti theen tum,\nMujhse milne darti ho ab.\n\nMujhse jitna ladti theen tum,\nUs se utna ladti ho ab?\n\nTod ke yun tum mujhko aakhir,\nKaise dilkash dikhti ho ab.\n\nUske zulmon pe bhi ho chup,\nKab se tum bhi aisi ho ab.\n\nAchhe din the, sachhi theen tum,\nTum toh bilkul farzi ho ab.\n\nItna sab kuch hone par bhi,\nMuskurati hansti ho ab.\n\nAb na aana mujh se milne,\nTum jo badli badli ho ab.\n\nZain meri ab hai arzi,\nMujh sa bhi na koi ho ab.",
        "trans": "How happy you remain in these passing days,\nTalking so much in your cheerful ways.\n\nYou were the one who broke our bond apart,\nHow do you die for him now with all your heart.\n\nYou used to call me a criminal in your mind,\nNow you fear meeting me, leaving it all behind.\n\nAs much as you used to fight with me back then,\nDo you fight that much with him time and again?\n\nAfter breaking me down to pieces so deep,\nHow do you look so charming in the beauty you keep.\n\nYou stay silent even at his cruel tyranny,\nSince when did you become so submissive to see.\n\nThose were good days when you were pure and true,\nNow everything about you is totally fake and new.\n\nEven after all that has happened and gone by,\nYou still smile and laugh under the open sky.\n\nDo not come to meet me anymore I say,\nNow that you have changed in every single way.\n\nZain, this is my final plea to the heavens above,\nMay no one ever be like me in matters of love."
    },
    {
        "roman": "Mukhtasar hai zindagi aise ki hum rote nahin,\nAankh lagti hai magar hum raat bhar sote nahin.\n\nMuddaton se haal apna ajnabi sa ho gaya,\nSochte hain der tak, par baat hum kehte nahin.\n\nIk ajab masla humari zindagi ka ye bhi hai,\nBaant-te hain hum sukoon sabko magar paate nahin.\n\nEk hi shikwa mujhe hai maqsad-e-jaan se mire,\nKyun kabhi meri gali se wo guzar jaate nahin.\n\nZain meri ahmiyat is daur mein kya hai bhala,\nLog mujh jaise zamane mein toh ab aate nahin.",
        "trans": "Life is so brief that we do not waste it in tears,\nEyes close, yet we stay awake through the nightly fears.\n\nFor ages, my own state has become a stranger to me,\nI ponder for hours, but keep my words under lock and key.\n\nA strange dilemma of our existence is this plight,\nWe distribute peace to all, but find none in our sight.\n\nI have but one complaint against the purpose of my life,\nWhy doesn't she ever cross my street to end this strife.\n\nWhat is my worth, Zain, in this modern day and age?,\nPeople like me no longer walk upon the worldly stage."
    }
];

        // --- RENDER LOGIC ---
        const container = document.getElementById('couplet-container');

        // Loop through the array and create HTML for each couplet
        coupletsArray.forEach(item => {
            // Create the card div
            const card = document.createElement('div');
            card.className = 'card';

            // Convert newlines (\n) to HTML breaks (<br>) for display
            const formattedRoman = item.roman.replace(/\n/g, '<br>');
            const formattedTrans = item.trans.replace(/\n/g, '<br>');

            // Set the inner HTML
            card.innerHTML = `
                <div class="couplet-roman">${formattedRoman}</div>
                <div class="divider"></div>
                <div class="couplet-translation">${formattedTrans}</div>
            `;

            // Append to container
            container.appendChild(card);
        });
    </script>
</body>
</html>
